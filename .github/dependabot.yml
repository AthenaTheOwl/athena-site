version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    # Major-version bumps on the Astro plugin family + Tailwind ecosystem
    # require coordinated migrations across peer dependents. Minor + patch
    # still flow through; major bumps land via a deliberate spec, not a PR.
    ignore:
      - dependency-name: "astro"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@astrojs/mdx"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@astrojs/tailwind"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@astrojs/sitemap"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@tailwindcss/typography"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
