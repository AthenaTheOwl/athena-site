name: Voice lint

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run voice lint
        run: python scripts/voice_lint.py
        continue-on-error: true   # advisory, not a merge gate
