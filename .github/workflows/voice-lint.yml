name: Voice lint

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run voice lint
        run: python scripts/voice_lint.py
        continue-on-error: true   # advisory, not a merge gate

      - name: Check factory QA
        run: |
          python scripts/factory_qa_index.py --check
          python scripts/check_factory_qa.py

      - name: Check for UTF-8 BOM
        run: python scripts/check_no_bom.py

      - name: Sensitive disclosure gate
        run: python scripts/validate_sensitive_disclosures.py
