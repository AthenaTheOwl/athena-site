name: Portfolio audit

on:
  schedule:
    - cron: "0 9 * * 1"   # Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install audit deps
        run: pip install httpx pyyaml

      - name: Validate cross-repo schema graph
        run: python scripts/validate_schema_graph.py

      - name: Run portfolio audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/portfolio_audit.py \
            --manifest ops/portfolio-manifest.yml \
            --output ops/portfolio-health.md \
            --auto-issue
        continue-on-error: true

      - name: Run portfolio dashboard
        # The dashboard probes sibling product repos under local_root.
        # In CI we only have athena-site checked out, so per-repo sections
        # for siblings will render as "Not checked out". That is the
        # expected CI behavior; the run still produces a fresh summary.
        run: |
          python scripts/portfolio_dashboard.py \
            --manifest ops/portfolio-manifest.yml \
            --output ops/portfolio-status.md
        continue-on-error: true

      - name: Run evidence quorum sentinel
        # Counts replay artifacts per active product repo in the last 30
        # days and fails the workflow when any checked-out repo falls below
        # the quorum. In CI only athena-site is checked out, so all watched
        # product repos render as SKIPPED and the sentinel exits 0; the
        # report still regenerates so its header reflects the run date.
        # See DEC-CDCP-018.
        run: |
          python scripts/evidence_quorum_sentinel.py \
            --manifest ops/portfolio-manifest.yml \
            --output ops/evidence-quorum-report.md \
            --window-days 30 \
            --threshold 1

      - name: Run DEC dependency graph generator
        # Walks each portfolio repo's `decisions/` directory and emits a DOT
        # graph + Markdown summary per repo plus a portfolio rollup. In CI
        # only athena-site is checked out; sibling repos render as
        # "not checked out" in the rollup. The local refresh on the
        # maintainer's box is the canonical regeneration.
        # See DEC-CDCP-017.
        if: always()
        run: |
          python scripts/dec_dependency_graph.py \
            --manifest ops/portfolio-manifest.yml \
            --output ops/dec-graphs

      - name: Run DEC coverage report
        # Scans each active CDCP repo's tests for references to the R-*
        # ids named by its DECs and emits ops/dec-coverage-report.md with
        # per-repo totals plus an uncovered-DEC breakdown. The script
        # exits 1 when portfolio coverage falls below --threshold.
        # The 5% bootstrap threshold sits just above the current floor;
        # a per-quarter DEC amendment ratchets it up by 10pp as repos
        # add R-* references to their tests. This is a real contract
        # gate now (continue-on-error: false), not a flagged advisory.
        # See DEC-CDCP-019.
        if: always()
        run: |
          python scripts/dec_coverage_report.py \
            --manifest ops/portfolio-manifest.yml \
            --output ops/dec-coverage-report.md \
            --threshold 5
        continue-on-error: false

      - name: Sensitive disclosure gate
        # Runs after generated reports and before the bot commit. This blocks
        # public-source publication of credentials, operational incident
        # detail, and unsafe remediation command material.
        if: always()
        run: python scripts/validate_sensitive_disclosures.py

      - name: Commit reports if changed
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ops/portfolio-health.md ops/portfolio-status.md ops/evidence-quorum-report.md ops/dec-graphs ops/dec-coverage-report.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "audit: weekly portfolio health + status + evidence quorum + DEC graphs + coverage"
            git push
          fi
