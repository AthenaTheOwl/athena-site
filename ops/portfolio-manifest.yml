# Portfolio manifest — source of truth for the audit script.
# scripts/portfolio_audit.py reads this; .github/workflows/portfolio-audit.yml runs it weekly.
#
# local_root: where product repos are checked out for the cdcp_status walk.
# Override with the RANDOM_APPS_ROOT env var. The default works on the
# maintainer's box; CI overrides via env when needed.
local_root: "e:/claude_code/random-apps"

royal_road:
  url: https://www.royalroad.com/fiction/149065/starforge-canticles

anthropic:
  # Auto-check skipped: api.anthropic.com/v1/models requires auth.
  # Note manually or via quarterly review at:
  # https://docs.anthropic.com/en/docs/about-claude/model-deprecations
  required_models: [claude-sonnet-4-6]
  manual_check_only: true

stale_active_threshold_days: 90

repos:
  - name: athena-site
    door: "11"
    status: active
    deploy_url: "https://athena-site-six.vercel.app"
    # athena-site owns the CDCP contracts but doesn't operate the model itself.
    cdcp_status: [meta-repo, cross-repo-schemas]
    # Catches deploy-stuck: HTTP 200 but stale content. Pick stable strings
    # that should appear on every fresh deploy; update if the site copy
    # intentionally changes.
    content_fingerprint:
      expected_substrings: ["Portfolio doors", "entry points"]

  - name: chip-supply-chain-map
    door: "12"
    status: active
    deploy_url: "https://chip-supply-chain-map.vercel.app"
    cdcp_status: [installed, operating-model, first-decs]
    file_freshness:
      path: src/data/nodes.csv
      threshold_days: 180
    content_fingerprint:
      expected_substrings: ["chip-supply-chain-map"]

  - name: supplier-risk-rag-agent
    door: "13"
    status: active
    deploy_url: "https://supplier-risk-rag-agent.streamlit.app"
    cdcp_status: [installed, operating-model, dreams-promoted, skills-graduated]
    file_freshness:
      path: reports/baseline_eval_report.html
      threshold_days: 90
    # Streamlit Community Cloud apps return a JS shell on initial GET; the
    # session content arrives via websocket. Use a stable shell-level marker
    # as "deploy reachable" signal only — full content rendering can't be
    # fingerprinted from a single HTTP GET.
    content_fingerprint:
      expected_substrings: ["streamlit"]

  - name: ai-field-brief
    door: "18"
    status: active
    deploy_url: "https://ai-field-brief.vercel.app"
    cdcp_status: [installed, operating-model, dreams-promoted, skills-graduated]
    file_freshness:
      path: briefs/INDEX.md
      threshold_days: 14
    # The latest brief week SHOULD appear on the homepage. Bump the
    # week marker when a new brief is published — when the deployed site
    # doesn't contain it, that's the deploy-stuck signal we missed for 13
    # days with W21 vs W23.
    content_fingerprint:
      expected_substrings: ["ai-field-brief", "2026-W23"]

  - name: procurement-negotiation-lab
    door: "17"
    status: active
    deploy_url: "https://procurement-negotiation-lab.vercel.app"
    cdcp_status: [installed, operating-model, dreams-promoted, skills-graduated]

  - name: ai-supply-chain-copilot-prd
    door: "10"
    status: active
    cdcp_status: [markdown-only, decisions-ledger]

  - name: mcp-security-lab
    door: "19"
    status: active
    cdcp_status: [installed, operating-model, first-decs]

  - name: trace-to-eval-harness
    door: "20"
    status: active
    cdcp_status: [installed, operating-model, first-decs]

  - name: sports-prediction-os
    door: "21"
    status: active
    cdcp_status: [cdcp-lite, has_specs]

  - name: starforge-narrative-tools
    door: "14"
    status: workshop
    fork_check: true

  - name: starforge-renpy-demo
    door: "15"
    status: workshop
    fork_check: true

  - name: starforge-rpg-prototype
    door: "16"
    status: workshop
    fork_check: true

  - { name: dispatch-optimizer, door: "01", status: active }
  - { name: LLM-evaluation-framework, door: "02", status: active }
  - { name: MIT-SDM-Thesis-on-System-Dynamics-Modeling-of-Bitcoin, door: "03", status: solved }
  - { name: world-food-program-robust-simulator, door: "04", status: solved }
  - { name: semiconductor-e2e-manufacturing-optimization, door: "05", status: solved }
  - { name: Robust-Facility-Location, door: "06", status: solved }
  - name: News-Bias-Multi-Agent-Pipeline
    door: "07"
    status: active
    deploy_url: "https://news-bias-pipeline.streamlit.app"
    content_fingerprint:
      expected_substrings: ["news-bias", "streamlit"]
  - { name: MIT-AI-Fall20, door: "08", status: drawer }
  - { name: leetcode, door: "09", status: drawer }
